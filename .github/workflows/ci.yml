name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# A new push to the same branch cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Matches devEngines.packageManager in package.json.
  PNPM_VERSION: 11.7.0
  # Node used for tooling (check, build) and for installing deps. pnpm 11
  # needs Node >= 22.13, and 26.3.0 is the newest version we target.
  NODE_VERSION: "26.3.0"

jobs:
  check:
    name: Check (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  build:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: better-ts resolves @better-ts/core from its dist, so
      # typecheck needs core built before it can run.
      - run: pnpm build
      - run: pnpm typecheck

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "26.3.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      # Install with a Node that pnpm supports (pnpm 11 does not run on Node 20).
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Switch to the target Node and run the suite directly, so the library
      # itself is exercised on the version we want to support.
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      - run: ./node_modules/.bin/vitest run
